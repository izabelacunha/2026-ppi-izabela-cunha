<!doctype html>
<title>{% block title %}{% endblock %} - Agenda de Fornecedores</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<nav>
  <h1>Agenda de Fornecedores</h1>

  <ul>
    {% if g.user %}
      <li><span>{{ g.user['username'] }}</span></li>
      <li><a href="{{ url_for('auth.logout') }}">Sair</a></li>
    {% else %}
      <li><a href="{{ url_for('auth.register') }}">Cadastrar</a></li>
      <li><a href="{{ url_for('auth.login') }}">Entrar</a></li>
    {% endif %}
  </ul>
</nav>

<section class="content">
  <header>
    {% block header %}{% endblock %}
  </header>

  {% for message in get_flashed_messages() %}
    <div class="flash">{{ message }}</div>
  {% endfor %}

  {% block content %}{% endblock %}
</section>
