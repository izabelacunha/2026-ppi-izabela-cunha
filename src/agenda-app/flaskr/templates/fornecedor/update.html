{% extends 'base.html' %}

{% block header %}
<h1>{% block title %}Editar Fornecedor{% endblock %}</h1>
{% endblock %}

{% block content %}
<form method="post">

<label for="nome">Nome</label>
<input
name="nome"
id="nome"
value="{{ request.form['nome'] or fornecedor['nome'] }}"
required>

<label for="telefone">Telefone</label>
<input
name="telefone"
id="telefone"
value="{{ request.form['telefone'] or fornecedor['telefone'] }}"
required>

<label for="servico">Serviço</label>
<input
name="servico"
id="servico"
value="{{ request.form['servico'] or fornecedor['servico'] }}"
required>

<input type="submit" value="Salvar">

</form>

<hr>

<form action="{{ url_for('fornecedor.delete', id=fornecedor['id']) }}" method="post">
<input class="danger" type="submit" value="Excluir">
</form>

{% endblock %}
